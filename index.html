<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Muslim Login</title>

<link rel="stylesheet" href="css/style.css">

<link
rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body class="login-body">

<!-- LOADER -->

<div id="loader">

    <div class="spinner"></div>

</div>

<!-- LOGIN -->

<div class="login-container">

    <img src="logo.png.PNG" class="login-logo">

    <h1>تسجيل الدخول</h1>

    <p class="login-subtitle">
‎        منصة خدمات الحج والعمرة الذكية
    </p>

    <form
    action="php/login.php"
    method="POST"
    id="loginForm">

        <div class="input-box">

            <i class="fa fa-id-card"></i>

            <input
            type="text"
            name="identity"
            id="identity"
            placeholder="رقم الهوية / الإقامة"
            required>

        </div>

        <div class="input-box">

            <i class="fa fa-lock"></i>

            <input
            type="password"
            name="password"
            placeholder="كلمة المرور"
            required>

        </div>

        <button type="submit">

            <i class="fa fa-right-to-bracket"></i>

‎            تسجيل الدخول

        </button>

    </form>

    <p id="loginError"></p>

    <div class="login-footer">

        <a href="#">
            Forgot Password?
        </a>

        <a href="#">
            Register New User
        </a>

    </div>

</div>

<script src="js/script.js"></script>

</body>
</html>
